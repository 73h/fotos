{% extends 'base.html' %}

{% block content %}
<div class="search-layout">
  <section class="search-main">
    <form
      id="search-form"
      class="search-form"
      hx-get="{{ url_for('web.search_partial') }}"
      hx-target="#results"
      hx-push-url="true"
      hx-indicator="#loading"
    >
      <input type="text" name="q" value="{{ query }}" placeholder="z. B. hund strand person:max month:3 year:2023" />
      <input type="number" name="per_page" value="{{ per_page }}" min="1" max="200" />
      <select name="album_id" id="album-filter-select" onchange="document.getElementById('search-form').requestSubmit()">
        <option value="">Alle Alben</option>
        {% for album in albums %}
        <option value="{{ album.id }}" {% if album.active %}selected{% endif %}>{{ album.name }} ({{ album.photo_count }})</option>
        {% endfor %}
      </select>
      <select name="person_id" id="person-filter-select" onchange="filterByPerson()">
        <option value="">Alle Personen</option>
        {% for person in persons %}
        <option value="{{ person.name }}">{{ person.name }} ({{ person.photo_count }})</option>
        {% endfor %}
      </select>

      <select id="month-filter-select" onchange="updateDateFilter()">
        <option value="">Alle Monate</option>
        <option value="1">Januar</option>
        <option value="2">Februar</option>
        <option value="3">März</option>
        <option value="4">April</option>
        <option value="5">Mai</option>
        <option value="6">Juni</option>
        <option value="7">Juli</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Dezember</option>
      </select>

      <input type="number" id="year-filter-input" placeholder="Jahr (z. B. 2023)" min="1900" max="2100" style="width: 140px;" onchange="updateDateFilter()" />

      <label class="filter-solo" title="Nur Bilder anzeigen, auf denen genau eine Person erkannt wurde">
        <input
          type="checkbox"
          id="solo-toggle"
          onchange="document.getElementById('max-persons-input').value = this.checked ? '1' : ''"
          {% if max_persons == 1 %}checked{% endif %}
        />
        Solo
      </label>
      <input type="hidden" name="max_persons" id="max-persons-input" value="{{ max_persons if max_persons else '' }}" />
      <button type="submit">Suchen</button>
      <span id="loading" class="loading">Lade...</span>

      <!-- Hamburger Menu -->
      <div class="menu-container">
        <button id="menu-toggle" class="menu-toggle" onclick="toggleMenu(event)" aria-label="Menü">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav id="menu-dropdown" class="menu-dropdown">
          <a href="{{ url_for('web.map_view', q=query, album_id=active_album_id, max_persons=max_persons) }}" class="menu-item">
            🗺️ Karte öffnen
          </a>
        </nav>
      </div>
    </form>

    {% if active_album_name %}
    <div class="active-filter-bar">
      Albumfilter aktiv: <strong>{{ active_album_name }}</strong>
      <a
        class="clear-filter-link"
        href="{{ url_for('web.home', q=query, per_page=per_page, max_persons=max_persons) }}"
      >
        Filter entfernen
      </a>
    </div>
    {% endif %}


    <section id="results">
      {% include '_results.html' %}
    </section>
  </section>

  <aside id="album-sidebar" class="album-sidebar" data-sidebar-url="{{ url_for('web.albums_sidebar') }}">
    {% include '_albums.html' %}
  </aside>
</div>
{% endblock %}
