{% extends 'base.html' %}

{% block title %}Foto-Karte{% endblock %}

{% block main_class %}layout--map{% endblock %}

{% block head %}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
  <style>
    .page-shell--map {
      gap: 18px;
    }

    .map-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px;
      border-radius: 28px;
      background: rgba(24, 19, 16, 0.94);
      border: 1px solid rgba(255, 143, 31, 0.16);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    .map-title {
      margin: 0;
      font-size: 1.3rem;
      color: var(--color-orange-light);
      letter-spacing: -0.01em;
    }

    .map-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .map-toolbar .menu-container {
      margin-left: 0;
      margin-right: 0;
    }

    .map-toolbar .menu-dropdown {
      left: 0;
      right: auto;
    }

    .map-toolbar__group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .map-toolbar__group--grow {
      flex: 1 1 380px;
    }

    .map-input {
      min-height: 46px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 143, 31, 0.22);
      background: linear-gradient(180deg, rgba(38, 29, 24, 0.96), rgba(23, 18, 15, 0.98));
      color: var(--color-text-light);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .map-input:focus {
      outline: none;
      border-color: rgba(255, 143, 31, 0.42);
      box-shadow: 0 0 0 4px rgba(255, 143, 31, 0.12);
    }

    .map-input--place {
      min-width: 280px;
      flex: 1 1 280px;
    }

    .map-input--radius {
      width: 130px;
    }

    .map-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 143, 31, 0.22);
      background: linear-gradient(135deg, var(--color-orange) 0%, var(--color-orange-dark) 100%);
      color: var(--color-text-dark);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      box-shadow: 0 10px 24px rgba(255, 143, 31, 0.18);
    }

    .map-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .map-btn.is-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: var(--color-text-light);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .map-btn.is-active {
      background: linear-gradient(135deg, #ffb15c 0%, var(--color-orange) 100%);
      color: var(--color-text-dark);
      border-color: rgba(255, 177, 92, 0.48);
    }

    .map-toolbar__stats {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--color-gray-light);
      font-size: 0.95rem;
    }

    .map-toolbar__stats strong,
    .status-line strong {
      color: var(--color-orange-light);
    }

    .status-line {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--color-gray-light);
      font-size: 0.95rem;
    }

    .map-frame {
      position: relative;
      min-height: calc(100vh - 300px);
      height: 72vh;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 143, 31, 0.14);
      background: rgba(0, 0, 0, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #181310;
      color: var(--color-text-light);
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.28);
    }

    .leaflet-popup-content {
      width: 260px !important;
      margin: 14px;
    }

    .popup-image {
      width: 100%;
      height: auto;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      cursor: pointer;
    }

    .popup-title {
      margin-bottom: 0.55rem;
      font-weight: 700;
      color: var(--color-text-light);
      word-break: break-all;
    }

    .popup-info {
      font-size: 0.84rem;
      color: var(--color-gray-light);
      line-height: 1.45;
    }

    .leaflet-control-zoom a,
    .leaflet-bar a {
      background: rgba(24, 19, 16, 0.95) !important;
      color: var(--color-text-light) !important;
      border-bottom-color: rgba(255, 143, 31, 0.12) !important;
    }

    .leaflet-control-attribution {
      background: rgba(16, 13, 11, 0.88) !important;
      color: var(--color-gray-light) !important;
    }

    .leaflet-control-attribution a {
      color: var(--color-orange-light) !important;
    }

    @media (max-width: 900px) {
      .map-panel {
        padding: 16px;
        border-radius: 22px;
      }

      .map-toolbar {
        align-items: stretch;
      }

      .map-toolbar__group,
      .map-toolbar__group--grow {
        width: 100%;
      }

      .map-input--place,
      .map-input--radius,
      .map-btn,
      .map-toolbar__stats {
        width: 100%;
      }

      .map-frame {
        min-height: 60vh;
        height: 60vh;
      }
    }
  </style>
  {% endblock %}

{% block content %}
  <div class="page-shell page-shell--map">
    <section class="map-panel" data-query="{{ query }}" data-album-id="{{ active_album_id if active_album_id else '' }}" data-person-count="{{ person_count if person_count else '' }}">
      <h1 class="map-title">Foto-Karte</h1>
      <div class="map-toolbar">
        <div class="menu-container">
          <button id="menu-toggle" class="menu-toggle" onclick="toggleMenu(event)" aria-label="Menü">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav id="menu-dropdown" class="menu-dropdown">
            <a href="{{ url_for('web.home', q=query, album_id=active_album_id, person_count=person_count) }}" class="menu-item">
              🔍 Zur Suche
            </a>
            <a href="{{ url_for('web.admin_page') }}" class="menu-item">
              🔧 Admin-Dashboard
            </a>
          </nav>
        </div>

        <div class="map-toolbar__group map-toolbar__group--grow">
          <input
            type="text"
            id="placeInput"
            class="map-input map-input--place"
            placeholder="Ort suchen, z. B. Prag oder Tegernsee"
            aria-label="Ort suchen"
          />
          <input
            type="number"
            id="radiusInput"
            class="map-input map-input--radius"
            placeholder="Radius (km)"
            value="5"
            aria-label="Radius in Kilometern"
          />
        </div>

        <div class="map-toolbar__group">
          <button type="button" class="map-btn" onclick="searchPlace()">Ort suchen</button>
          <button type="button" class="map-btn is-secondary" onclick="clearPlaceFilter()">Ortsfilter zurücksetzen</button>
          <button type="button" class="map-btn is-secondary" onclick="fitToPhotos()">Auf Fotos zoomen</button>
        </div>

        <div class="map-toolbar__group">
          <button id="markersModeBtn" type="button" class="map-btn is-active" onclick="setMapMode('markers')">Marker</button>
          <button id="heatmapModeBtn" type="button" class="map-btn is-secondary" onclick="setMapMode('heatmap')">Heatmap</button>
        </div>

        <div class="map-toolbar__stats">
          <span><strong id="photoCount">0</strong> GPS-Fotos</span>
          <span>•</span>
          <span><strong id="visiblePhotoCount">0</strong> sichtbar</span>
        </div>
      </div>

      <div class="status-line">
        Aktive Datenbasis:
        <strong id="activeFilterSummary">alle GPS-Fotos</strong>
        <span id="placeSummary"></span>
      </div>

      <div class="map-frame">
        <div id="map"></div>
      </div>
    </section>
  </div>

  <!-- initial-map-filters: q: {{ query|tojson }}, album_id: {{ active_album_id if active_album_id is not none and active_album_id != '' else 'null' }}, person_count: {{ person_count if person_count is not none and person_count != '' else 'null' }} -->

  <script>
    const mapPanel = document.querySelector(".map-panel");
    const initialFilters = {
      q: mapPanel ? mapPanel.dataset.query || "" : "",
      album_id: mapPanel ? mapPanel.dataset.albumId || "" : "",
      person_count: mapPanel ? mapPanel.dataset.personCount || "" : "",
    };

    const map = L.map("map").setView([50, 10], 4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    let markerLayer = L.markerClusterGroup();
    map.addLayer(markerLayer);
    let heatLayer = null;
    let markers = [];
    let photos = [];
    let filteredPhotos = [];
    let hasAutoFit = false;
    let mapMode = "markers";
    let activePlace = null;
    let activeCircle = null;
    let activePlaceMarker = null;

    function buildApiUrl() {
      const url = new URL("/api/photos-with-location", window.location.origin);
      url.searchParams.set("limit", "50000");
      if (initialFilters.q) {
        url.searchParams.set("q", initialFilters.q);
      }
      if (initialFilters.album_id) {
        url.searchParams.set("album_id", initialFilters.album_id);
      }
      if (initialFilters.person_count) {
        url.searchParams.set("person_count", initialFilters.person_count);
      }
      return url.toString();
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const earthRadiusKm = 6371.0;
      const toRad = (value) => value * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadiusKm * c;
    }

    function renderPlaceOverlay() {
      if (activeCircle) {
        map.removeLayer(activeCircle);
        activeCircle = null;
      }
      if (activePlaceMarker) {
        map.removeLayer(activePlaceMarker);
        activePlaceMarker = null;
      }

      if (!activePlace) {
        document.getElementById("placeSummary").textContent = "";
        return;
      }

      activePlaceMarker = L.marker([activePlace.lat, activePlace.lon]).addTo(map);
      activePlaceMarker.bindPopup(`<strong>${activePlace.name}</strong>`);
      activeCircle = L.circle([activePlace.lat, activePlace.lon], {
        radius: activePlace.radiusKm * 1000,
        color: "#ff8f1f",
        weight: 1,
        fillColor: "#ff8f1f",
        fillOpacity: 0.12,
      }).addTo(map);

      document.getElementById("placeSummary").textContent = ` · Ortsfilter: ${activePlace.name} (${activePlace.radiusKm} km)`;
    }

    function updateFilterSummary() {
      const parts = [];
      if (initialFilters.q) {
        parts.push(`Suche: ${initialFilters.q}`);
      }
      if (initialFilters.album_id) {
        parts.push(`Album-ID: ${initialFilters.album_id}`);
      }
      if (initialFilters.person_count) {
        parts.push(`Personenzahl: ${initialFilters.person_count}`);
      }
      document.getElementById("activeFilterSummary").textContent = parts.length ? parts.join(" · ") : "alle GPS-Fotos";
    }

    function getRadiusKm() {
      const parsed = Number(document.getElementById("radiusInput").value || 5);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : 5;
    }

    function applyPlaceFilter() {
      if (!activePlace) {
        filteredPhotos = [...photos];
      } else {
        filteredPhotos = photos.filter((photo) => (
          haversineKm(activePlace.lat, activePlace.lon, photo.latitude, photo.longitude) <= activePlace.radiusKm
        ));
      }
      renderPhotos(filteredPhotos);
    }

    function buildPopup(photo) {
      return L.popup().setContent(`
        <div class="popup-title">${photo.path.split(/[/\\]/).pop()}</div>
        <img src="${photo.thumb_url}" alt="Thumbnail" class="popup-image" onclick="window.open('${photo.image_url}', '_blank')" />
        <div class="popup-info">
          <div><strong>Kamera:</strong> ${photo.camera}</div>
          <div><strong>Lat:</strong> ${photo.latitude.toFixed(4)}</div>
          <div><strong>Lon:</strong> ${photo.longitude.toFixed(4)}</div>
          <div><strong>Aufnahme:</strong> ${photo.captured_ts ? new Date(photo.captured_ts * 1000).toLocaleDateString("de-DE") : "-"}</div>
        </div>
      `);
    }

    function renderPhotos(photoItems) {
      markerLayer.clearLayers();
      markers = [];

      if (heatLayer) {
        map.removeLayer(heatLayer);
        heatLayer = null;
      }

      if (mapMode === "heatmap") {
        const heatData = photoItems.map((photo) => [photo.latitude, photo.longitude, 0.5]);
        heatLayer = L.heatLayer(heatData, {
          radius: 22,
          blur: 16,
          maxZoom: 13,
        }).addTo(map);
      } else {
        photoItems.forEach((photo) => {
          const marker = L.marker([photo.latitude, photo.longitude]).bindPopup(buildPopup(photo));
          markerLayer.addLayer(marker);
          markers.push(marker);
        });
      }

      document.getElementById("photoCount").textContent = photos.length;
      document.getElementById("visiblePhotoCount").textContent = photoItems.length;
      renderPlaceOverlay();

      if (!hasAutoFit && photoItems.length > 0) {
        fitToPhotos();
        hasAutoFit = true;
      }
    }

    async function loadPhotos() {
      try {
        const response = await fetch(buildApiUrl());
        const data = await response.json();
        photos = data.photos;
        applyPlaceFilter();
      } catch (error) {
        console.error("Fehler beim Laden der Fotos:", error);
      }
    }

    function setMapMode(mode) {
      mapMode = mode;
      document.getElementById("markersModeBtn").classList.toggle("is-active", mode === "markers");
      document.getElementById("markersModeBtn").classList.toggle("is-secondary", mode !== "markers");
      document.getElementById("heatmapModeBtn").classList.toggle("is-active", mode === "heatmap");
      document.getElementById("heatmapModeBtn").classList.toggle("is-secondary", mode !== "heatmap");
      renderPhotos(filteredPhotos);
    }

    async function searchPlace() {
      const place = document.getElementById("placeInput").value.trim();
      if (!place) {
        clearPlaceFilter();
        return;
      }
      try {
        const response = await fetch(`/api/geocode?q=${encodeURIComponent(place)}`);
        const data = await response.json();
        if (!data.results || data.results.length === 0) {
          (window.showToast || window.alert)("Ort nicht gefunden.", "info", 2200);
          return;
        }
        const first = data.results[0];
        activePlace = {
          name: first.display_name,
          lat: first.lat,
          lon: first.lon,
          radiusKm: getRadiusKm(),
        };
        map.setView([activePlace.lat, activePlace.lon], 11);
        applyPlaceFilter();
      } catch (error) {
        console.error("Fehler bei der Ortssuche:", error);
        (window.showToast || window.alert)("Ortssuche derzeit nicht verfügbar.", "error", 3200);
      }
    }

    function clearPlaceFilter() {
      activePlace = null;
      document.getElementById("placeInput").value = "";
      applyPlaceFilter();
    }

    async function reverseGeocodeAt(lat, lon) {
      try {
        const response = await fetch(`/api/reverse-geocode?lat=${lat}&lon=${lon}`);
        const data = await response.json();
        const result = data.result;
        activePlace = {
          name: result?.display_name || `${lat.toFixed(4)}, ${lon.toFixed(4)}`,
          lat,
          lon,
          radiusKm: getRadiusKm(),
        };
        document.getElementById("placeInput").value = activePlace.name;
        applyPlaceFilter();
      } catch (error) {
        console.error("Fehler beim Reverse-Geocoding:", error);
      }
    }

    function fitToPhotos() {
      if (filteredPhotos.length === 0) {
        (window.showToast || window.alert)("Keine Fotos mit GPS-Daten gefunden.", "info", 2400);
        return;
      }

      const fitMarkers = filteredPhotos.map((photo) => L.marker([photo.latitude, photo.longitude]));
      const group = new L.featureGroup(fitMarkers);
      map.fitBounds(group.getBounds(), { padding: [50, 50] });
    }

    map.on("click", async (event) => {
      await reverseGeocodeAt(event.latlng.lat, event.latlng.lng);
    });

    document.getElementById("placeInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        searchPlace();
      }
    });

    updateFilterSummary();
    loadPhotos();
    setInterval(loadPhotos, 30000);
  </script>
{% endblock %}
