<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Fotos Suche{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='web.css') }}" />
    <script defer src="{{ url_for('static', filename='web.js') }}"></script>
    {% block head %}{% endblock %}
  </head>
  <body class="{% block body_class %}app-body{% endblock %}">
    <main class="layout {% block main_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>

    <!-- Photo Detail Modal -->
    <div id="photo-modal" class="photo-modal" onclick="closePhotoModal(event)">
      <div class="photo-modal-content" onclick="event.stopPropagation()">
        <button class="modal-close-btn" onclick="closePhotoModal()">✕</button>

        <div class="modal-body">
          <div class="modal-image-container">
            <img id="modal-photo" src="" alt="Photo" class="modal-photo" />
          </div>

          <div class="modal-details-container">
            <div id="modal-details" class="modal-details">
              <div class="details-loading">Lade Details...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
